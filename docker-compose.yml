version: "3.8"

services:

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: gotenberg
    ports:
      - "3000:3000"
    command:
      - "gotenberg"
      - "--chromium-disable-routes=false"
      - "--libreoffice-disable-routes=false"
      - "--pdfengines-disable-routes=false"
    restart: unless-stopped

  localstack:
    image: localstack/localstack:3
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - AWS_DEFAULT_REGION=us-east-1
      - EAGER_SERVICE_LOADING=1
    volumes:
      - "./init-s3.sh:/etc/localstack/init/ready.d/init-s3.sh"
    restart: unless-stopped

  pdf-generator:
    build: .
    container_name: pdf-generator
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - GOTENBERG_BASE_URL=http://gotenberg:3000
      - AWS_ACCESS_KEY=test
      - AWS_SECRET_KEY=test
      - AWS_REGION=us-east-1
      - S3_BUCKET_NAME=pdf-dev-bucket
      - AWS_S3_ENDPOINT=http://localstack:4566
    depends_on:
      - gotenberg
      - localstack
    restart: unless-stopped
